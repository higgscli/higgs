# GoReleaser v2 config. Triggered by the release.yml workflow on v*.*.* tags.
# See https://goreleaser.com for documentation.
version: 2

project_name: higgs

before:
  hooks:
    - go mod tidy

builds:
  - id: higgs
    main: ./cmd/higgs
    binary: higgs
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    hooks:
      # Sign + notarize darwin binaries in place, before they are archived, so
      # macOS Gatekeeper recognizes them. No-ops for non-darwin targets and when
      # signing credentials are absent (e.g. local snapshot builds). See
      # scripts/macos-sign.sh and the release workflow for credential wiring.
      post:
        - cmd: bash scripts/macos-sign.sh "{{ .Os }}" "{{ .Path }}"
          output: true

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE
      - README.md
      - CHANGELOG.md

brews:
  - name: higgs
    repository:
      owner: higgscli
      name: homebrew-higgs
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} {{ .Tag }}"
    homepage: "https://github.com/higgscli/higgs"
    description: "Agent-first CLI for Proton Mail — schema manifest, NDJSON, typed errors, stable exit codes"
    license: "Apache-2.0"
    skip_upload: auto
    install: |
      bin.install "higgs"
    test: |
      system "#{bin}/higgs", "--version"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github-native
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Dependencies
      regexp: '^.*?deps(\(.+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999

sboms:
  - artifacts: archive

# Keyless signing via cosign + GitHub OIDC. Signs checksums.txt only;
# verifying checksums.txt transitively verifies every archive.
# Uses cosign v2 bundle format: one .sig file contains signature + certificate.
signs:
  - cmd: cosign
    args:
      - sign-blob
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"
    artifacts: checksum
    output: true

release:
  github:
    owner: higgscli
    name: higgs
  draft: false
  prerelease: auto
  mode: append
  name_template: "v{{ .Version }}"
  footer: |
    ---
    **Verifying a release**

    1. Download `checksums.txt` and `checksums.txt.sig`.
    2. Verify the signature:
       ```sh
       cosign verify-blob \
         --bundle      checksums.txt.sig \
         --certificate-identity-regexp 'https://github.com/higgscli/higgs' \
         --certificate-oidc-issuer     'https://token.actions.githubusercontent.com' \
         checksums.txt
       ```
    3. Verify the archive: `sha256sum -c checksums.txt`.
