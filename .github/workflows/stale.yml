# Stale workflow: marks issues and PRs as stale after 60 days of inactivity,
# then closes them 14 days later unless activity resumes. Issues carrying the
# labels `pinned`, `security`, or `good first issue` are exempted.

name: Stale

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    name: mark stale
    runs-on: ubuntu-latest
    steps:
      - name: Stale
        uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,security,good first issue'
          exempt-pr-labels: 'pinned,security,good first issue'
          stale-issue-message: >-
            This issue has been automatically marked as stale because it has
            had no activity for 60 days. It will be closed in 14 days if no
            further activity occurs. Thank you for your contributions.
          stale-pr-message: >-
            This pull request has been automatically marked as stale because
            it has had no activity for 60 days. It will be closed in 14 days
            if no further activity occurs. Thank you for your contributions.
          close-issue-message: >-
            Closing this issue due to inactivity. Feel free to reopen if it
            is still relevant.
          close-pr-message: >-
            Closing this pull request due to inactivity. Feel free to reopen
            if you'd like to continue work.
