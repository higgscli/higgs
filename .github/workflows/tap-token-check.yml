# Temporary diagnostic: proves the tap-publisher GitHub App can mint an
# installation token that reaches higgscli/homebrew-higgs — the exact API
# call the release workflow's formula push starts with. Safe to delete once
# a real release has exercised the app path.

name: Tap token check

on:
  workflow_dispatch:

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Mint tap token
        id: tap-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.TAP_APP_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: higgscli
          repositories: homebrew-higgs

      - name: Verify tap access
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
        run: |
          set -euo pipefail
          # The call goreleaser 401'd on: repo metadata (default branch).
          gh api repos/higgscli/homebrew-higgs --jq '"default branch: " + .default_branch'
          # Contents permission: read the formula the release flow rewrites.
          gh api repos/higgscli/homebrew-higgs/contents/Formula/higgs.rb --jq '"formula readable: " + .name'
          echo "tap token OK"
