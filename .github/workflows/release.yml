# Release workflow: on a semver tag push (vX.Y.Z), runs GoReleaser to build
# multi-arch binaries, generate SBOMs, cosign-sign artifacts (keyless via
# OIDC), and publish a GitHub Release.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Install Syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to GHCR
        # Only log in when we have a token; goreleaser may push container images.
        if: ${{ env.GITHUB_TOKEN != '' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install rcodesign (Apple code signing)
        run: |
          set -euo pipefail
          ver=0.29.0
          asset="apple-codesign-${ver}-x86_64-unknown-linux-musl"
          url="https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F${ver}/${asset}.tar.gz"
          curl -fsSL "$url" -o /tmp/rcodesign.tar.gz
          echo "dbe85cedd8ee4217b64e9a0e4c2aef92ab8bcaaa41f20bde99781ff02e600002  /tmp/rcodesign.tar.gz" | sha256sum -c -
          tar -xzf /tmp/rcodesign.tar.gz -C /tmp
          sudo install -m 0755 "/tmp/${asset}/rcodesign" /usr/local/bin/rcodesign
          rcodesign --version

      - name: Prepare macOS signing credentials
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERT_P12}" ]; then
            echo "No MACOS_CERT_P12 secret present — darwin binaries will NOT be signed."
            exit 0
          fi
          d="${RUNNER_TEMP}/macos-sign"
          mkdir -p "$d"
          printf '%s' "$MACOS_CERT_P12"   | tr -d '[:space:]' | base64 -d > "$d/cert.p12"
          printf '%s' "$MACOS_CERT_PASSWORD" > "$d/p12.pw"
          printf '%s' "$APPLE_API_KEY_P8"  | tr -d '[:space:]' | base64 -d > "$d/AuthKey.p8"
          rcodesign encode-app-store-connect-api-key \
            --output-path "$d/asc-key.json" \
            "$APPLE_API_ISSUER_ID" "$APPLE_API_KEY_ID" "$d/AuthKey.p8"
          chmod 600 "$d"/*
          {
            echo "MACOS_SIGN_P12_FILE=$d/cert.p12"
            echo "MACOS_SIGN_P12_PASSWORD_FILE=$d/p12.pw"
            echo "MACOS_NOTARY_API_KEY_FILE=$d/asc-key.json"
          } >> "$GITHUB_ENV"
          echo "macOS signing credentials prepared at $d"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
